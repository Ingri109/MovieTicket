name: Docker Build and Publish

on:
  push:
    branches: [ "main" ]

env:
  REGISTRY: ghcr.io

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Log in to the Container registry
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      # Збирання Фронтенду
      - name: Build and push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./movieticket-client
          push: true
          # Замінили змінну на ingri109 (тільки маленькі літери)
          tags: ${{ env.REGISTRY }}/ingri109/movieticket-frontend:latest

      # Збирання Основного API
      - name: Build and push Backend API
        uses: docker/build-push-action@v5
        with:
          context: ./movieticket-server
          file: ./movieticket-server/MovieTicket/Dockerfile
          push: true
          # Замінили змінну на ingri109 (тільки маленькі літери)
          tags: ${{ env.REGISTRY }}/ingri109/movieticket-api:latest

      # Збирання Email Воркера
      - name: Build and push Email Worker
        uses: docker/build-push-action@v5
        with:
          context: ./movieticket-server
          file: ./movieticket-server/MovieTicket.EmailWorker/Dockerfile
          push: true
          # Замінили змінну на ingri109 (тільки маленькі літери)
          tags: ${{ env.REGISTRY }}/ingri109/movieticket-email-worker:latest